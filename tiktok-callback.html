<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>TikTok Authorization – EQC | Evolution Quantum Capital</title>
<style>
  :root{--bg:#050f1e;--gold:#c9a84c;--white:#ffffff;--blue:#8899bb;--green:#3dba5e;--divider:#0e2035;}
  body{background:var(--bg);color:var(--white);font-family:'Syne',system-ui,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  .card{max-width:560px;margin:24px;padding:40px;background:var(--divider);border:1px solid #1a3050;border-radius:8px;text-align:center;}
  h1{font-size:22px;color:var(--gold);margin:0 0 12px;}
  p{color:var(--blue);font-size:14px;line-height:1.6;}
  code{display:block;background:var(--bg);color:var(--green);font-family:'DM Mono',monospace;font-size:13px;padding:14px;border-radius:6px;margin:16px 0;word-break:break-all;user-select:all;}
  .ok{color:var(--green);}
  .err{color:#d05555;}
  .footer{margin-top:24px;font-size:11px;color:#6688aa;}
</style>
</head>
<body>
<div class="card">
  <h1>Evolution Quantum Capital</h1>
  <div id="status"><p>Processing TikTok authorization…</p></div>
  <div class="footer">© 2026 Evolution Quantum Capital · <a href="/privacy.html" style="color:#6688aa;">Privacy Policy</a> · <a href="/terms.html" style="color:#6688aa;">Terms of Service</a></div>
</div>
<script>
  var q = new URLSearchParams(window.location.search);
  var el = document.getElementById('status');
  if (q.get('code')) {
    el.innerHTML = '<p class="ok">✓ Authorization successful.</p>' +
      '<p>Copy the full URL from the address bar and paste it into the EQC setup script (tiktok_auth.py).</p>' +
      '<code>' + window.location.href.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</code>';
  } else if (q.get('error')) {
    el.innerHTML = '<p class="err">✕ Authorization failed: ' +
      (q.get('error_description') || q.get('error') || 'unknown error').replace(/</g,'&lt;') + '</p>';
  } else {
    el.innerHTML = '<p>This page receives the TikTok OAuth redirect for the official EQC account integration. No user data is collected on this page.</p>';
  }
</script>
</body>
</html>
